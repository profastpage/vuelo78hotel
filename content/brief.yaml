faq:
  - question: '¿Que debe clonarse de la web de referencia?'
    answer: 'Solo layout, composicion, patrones interactivos y jerarquia visual. Nunca marca, logos, textos ni imagenes reales.'
  - question: '¿Se deben conservar las tabs detectadas?'
    answer: 'Si. Deben replicarse las tabs con labels nuevas y contenido real del nuevo cliente.'
  - question: '¿El popup o modal debe mantenerse?'
    answer: 'Si, pero con nuevo copy, nuevos triggers y sin copiar ningun asset del sitio original.'
